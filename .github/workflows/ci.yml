name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    name: Backend (hw13)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hw13
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hw13/package.json
      - name: Install
        run: npm ci
      - name: Lint (if configured)
        run: npx -y eslint . || echo "eslint not configured; skipping"
      - name: Build (if configured)
        run: |
          if npm run | grep -q " build"; then
            npm run build;
          else
            echo "no build script; skipping";
          fi

  frontend:
    name: Frontend (hw6/client)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hw6/client
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hw6/client/package.json
      - name: Install
        run: npm ci
      - name: Lint (if configured)
        run: npx -y eslint . || echo "eslint not configured; skipping"
      - name: Build
        run: |
          if npm run | grep -q " build"; then
            npm run build;
          else
            echo "no build script; skipping";
          fi
